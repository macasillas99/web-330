<!DOCTYPE html>
<html lang="en">
  <head>
    <!--

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table Reservation</title>
    <link rel="stylesheet" type="text/css" href="styles.css" />
  </head>
  <body>
    <main class="page-wrapper">
      <section class="reservation-card">
        <h1>Restaurant Table Reservations</h1>
        <p class="intro">
          Enter your name and choose an available table number to reserve your spot.
        </p>

        <form id="reservationForm">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your name" required />

          <label for="tableNumber">Table Number</label>
          <select id="tableNumber" name="tableNumber" required>
            <option value="">Choose a table</option>
            <option value="1">Table 1 - Seats 2</option>
            <option value="2">Table 2 - Seats 4</option>
            <option value="3">Table 3 - Seats 4</option>
            <option value="4">Table 4 - Seats 6</option>
            <option value="5">Table 5 - Seats 8</option>
          </select>

          <input type="submit" value="Reserve Table" />
        </form>

        <p id="message" class="message"></p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
